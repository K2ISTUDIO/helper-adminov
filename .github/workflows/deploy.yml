name: Deploy to PlanetHoster

on:
  push:
    branches: [main]
    paths:
      - 'index.php'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   node242-eu.n0c.com
          username: deploy@neomails.fr
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir:  ./
          server-dir: public_html/adminov/
          include: |
            index.php
          log-level: minimal
